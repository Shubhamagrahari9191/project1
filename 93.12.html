<!DOCTYPE html>
<html lang="en">
<head>

  <title>Contact Me</title>
  <style>
    /* Global Styles */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      background-color: #f4f4f9;
      color: #333;
    }

    .header {
      text-align: center;
      background-color: #0078d7;
      color: #fff;
      padding: 2rem 1rem;
    }

    .contact-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    .contact-card {
      background-color: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 2rem;
      width: 90%;
      max-width: 600px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .contact-card h2 {
      margin-bottom: 1rem;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .social-links a {
      text-decoration: none;
      font-size: 1.5rem;
      color: #0078d7;
      transition: color 0.3s;
    }

    .social-links a:hover {
      color: #005bb5;
    }

    .footer {
      text-align: center;
      padding: 1rem;
      background-color: #333;
      color: #fff;
      margin-top: 2rem;
    }
  </style>
</head>
